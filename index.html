<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>spies in the wires</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
}
body {
    background: #050505;
    color: #ffffff;
    font-family: "Courier New", monospace;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 22vh;
}
.main {
    line-height: 2;
    font-size: 2rem;
}
.status {
    margin-top: 1rem;
}
#transmission {
    opacity: 0;
    transition: opacity 2s ease-in-out;
}
#transmission.visible {
    opacity: 1;
}
</style>
</head>
<body>
<div class="main">
    <div>spies in the wires</div>
    <br>
    <div>signal detected.</div>
    <br>
    <div class="status">
        <span id="transmission">Transmission in progress.</span>
    </div>
</div>
<script>
const messages = [
    "Transmission in progress.",
    "Übertragung läuft.",      // German
    "传输进行中。",            // Chinese
    "Передача выполняется.", // Russian
    "전송 진행 중.",         // Korean
    "Overføring pågår.",    // Norwegian
    "送信中。",             // Japanese
    "Transmission en cours.", // French
    "Transmisión en curso.",  // Spanish
    "Transmisja w toku.",     // Polish
    "Sending í gangi.",       // Icelandic
    "प्रसारण जारी है।",        // Hindi
    "Transmissão em andamento.", // Portuguese
    "Tiedonsiirto käynnissä.", // Finnish
    "Trasmissione in corso.",  // Italian
    "Передача триває.",        // Ukrainian
    "Adatátvitel folyamatban." // Hungarian
];
let index = -1;
const element = document.getElementById("transmission");
element.classList.add("visible");
function cycleText() {
    element.classList.remove("visible");
    setTimeout(() => {
        index = (index + 1) % messages.length;
        element.textContent = messages[index];
        element.classList.add("visible");
    }, 2000);
}
cycleText();
setInterval(cycleText, 6000);
</script>
</body>
</html>
